<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>리스닝 학습</title>
<link rel="stylesheet" href="shared/theme.css">
<style>
.q-list-item { display:flex;align-items:center;gap:12px;padding:.875rem 0;border-bottom:1px solid var(--bdr);cursor:pointer;transition:all .15s; }
.q-list-item:last-child { border-bottom:none; }
.q-list-item:hover { opacity:.8; }
.q-num { font-family:var(--font-mono);font-size:11px;color:var(--txt3);min-width:32px;text-align:center;background:var(--sur2);border-radius:6px;padding:4px 6px;letter-spacing:.04em; }
.q-num.done { background:var(--grn-bg);color:var(--grn); }
.q-type-badge { font-size:9px;font-weight:600;letter-spacing:.06em;padding:2px 7px;border-radius:3px;flex-shrink:0; }
.q-diff { font-size:10px;color:var(--txt3);margin-left:auto; }
.dr-match { color:var(--grn); }
.dr-miss { color:var(--red);text-decoration:underline; }
.kw-card { display:flex;align-items:flex-start;gap:10px;padding:.625rem 0;border-bottom:1px solid var(--bdr);font-size:13px; }
.kw-card:last-child { border-bottom:none; }
.kw-en { font-size:15px;font-weight:600;color:var(--gold);min-width:110px; }
.kw-ko { color:var(--txt); }
.speed-row { display:flex;gap:6px;flex-wrap:wrap;margin-bottom:.875rem; }
.sub-tab { display:flex;gap:4px;margin-bottom:1rem; }
.sentence { display:block;padding:4px 6px;margin:2px 0;border-radius:6px;cursor:pointer;line-height:1.85;transition:background .15s; }
.sentence:hover { background:var(--sur2); }
.sentence.speaking { background:var(--gold-bg);border-left:2px solid var(--gold);padding-left:8px; }
.keyword { color:var(--gold);font-weight:600;cursor:pointer;border-bottom:1px dotted var(--gold-bdr); }
.keyword:hover { background:var(--gold-bg);border-radius:3px; }
.tts-hint { font-size:10px;color:var(--txt3);margin-bottom:.5rem; }
.sub-tab-btn { flex:1;padding:7px;text-align:center;border:1px solid var(--bdr);background:var(--sur2);border-radius:var(--rs);cursor:pointer;font-size:11px;font-family:var(--font-body);font-weight:500;color:var(--txt2);transition:all .15s; }
.sub-tab-btn.active { background:var(--gold-bg);border-color:var(--gold-bdr);color:var(--gold);font-weight:600; }
</style>
</head>
<body>
<div class="app">

<div class="topbar">
  <div class="logo">
    <div class="logo-mark">🎧</div>
    <div>
      <div class="logo-text-main" id="page-title">리스닝 학습</div>
      <div class="logo-text-sub">Listening</div>
    </div>
  </div>
  <button class="btn btn-ghost" id="back-btn" onclick="goBack()">← 홈</button>
</div>

<div id="view-library" class="fade-in">
  <p class="sec-title">회차 선택</p>
  <div class="catalog-grid" id="catalog-grid"></div>
</div>

<div id="view-set" style="display:none">
  <div class="card card-sm" style="margin-bottom:1rem" id="set-info-card"></div>
  <div class="card card-sm">
    <p class="sec-title" style="margin-bottom:.875rem">문항 목록</p>
    <div id="q-list"></div>
  </div>
</div>

<div id="view-question" style="display:none">
  <div class="player-card">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.875rem">
      <div>
        <span class="badge b-gold" id="q-num-badge">Q.1</span>
        <span class="badge" id="q-type-badge" style="margin-left:6px"></span>
      </div>
      <span class="badge" id="q-diff-badge"></span>
    </div>
    <div style="font-size:13px;color:var(--txt2);line-height:1.5;margin-bottom:1rem" id="q-question"></div>
    <audio id="player-audio" preload="none"></audio>
    <div class="player-track">
      <span class="player-time" id="time-cur">0:00</span>
      <div style="flex:1;height:4px;background:var(--sur3);border-radius:2px;cursor:pointer" onclick="seekAudio(event)" id="prog-bar">
        <div id="audio-fill" style="height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:2px;width:0%;pointer-events:none;transition:width .1s linear"></div>
      </div>
      <span class="player-time" id="time-dur">0:00</span>
    </div>
    <div style="display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:1rem">
      <button class="player-btn" onclick="seekRel(-5)">⏮</button>
      <button class="player-btn" onclick="seekRel(-10)">⏪</button>
      <button class="player-btn player-btn-main" id="play-btn" onclick="togglePlay()">▶</button>
      <button class="player-btn" onclick="seekRel(10)">⏩</button>
      <button class="player-btn" onclick="seekRel(5)">⏭</button>
    </div>
    <div class="speed-row">
      <span style="font-size:10px;color:var(--txt3);align-self:center;text-transform:uppercase">배속</span>
      <button class="speed-btn" onclick="setSpeed(0.5)">0.5×</button>
      <button class="speed-btn" onclick="setSpeed(0.75)">0.75×</button>
      <button class="speed-btn active" onclick="setSpeed(1.0)">1.0×</button>
      <button class="speed-btn" onclick="setSpeed(1.25)">1.25×</button>
      <button class="speed-btn" onclick="setSpeed(1.5)">1.5×</button>
    </div>
    <!-- A-B 구간 반복 -->
    <div style="margin-top:.5rem">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:.375rem">
        <span style="font-size:10px;color:var(--txt3);text-transform:uppercase">구간반복</span>
        <button id="ab-btn-a" class="speed-btn" onclick="setAbPoint('a')" style="min-width:36px">A</button>
        <button id="ab-btn-b" class="speed-btn" onclick="setAbPoint('b')" style="min-width:36px">B</button>
        <button id="ab-loop-btn" class="speed-btn" onclick="toggleAbLoop()" style="display:none;min-width:52px">반복▶</button>
        <button onclick="clearAb()" style="font-size:10px;color:var(--txt3);background:none;border:none;cursor:pointer">초기화</button>
      </div>
      <!-- A-B 바 -->
      <div id="ab-track" style="position:relative;height:14px;background:var(--sur3);border-radius:7px;cursor:pointer;display:none" onclick="seekAudioFromAb(event)">
        <div id="ab-range" style="position:absolute;height:100%;background:rgba(201,169,97,.3);border-radius:7px;left:0;width:0"></div>
        <div id="ab-handle-a" style="position:absolute;top:50%;transform:translate(-50%,-50%);width:14px;height:14px;background:var(--gold);border-radius:50%;display:none;cursor:pointer"></div>
        <div id="ab-handle-b" style="position:absolute;top:50%;transform:translate(-50%,-50%);width:14px;height:14px;background:var(--gold2,#F59E0B);border-radius:50%;display:none;cursor:pointer"></div>
        <div id="ab-cur-pos" style="position:absolute;top:0;width:2px;height:100%;background:var(--txt3);border-radius:1px;pointer-events:none;left:0"></div>
      </div>
      <div id="ab-time-display" style="font-size:10px;color:var(--txt3);margin-top:2px;text-align:center;display:none"></div>
    </div>
  </div>

  <div class="sub-tab">
    <button class="sub-tab-btn active" id="stab-script" onclick="switchTab('script')">📄 스크립트</button>
    <button class="sub-tab-btn" id="stab-keywords" onclick="switchTab('keywords')">📚 단어</button>
    <button class="sub-tab-btn" id="stab-tip" onclick="switchTab('tip')">💡 팁</button>
  </div>

  <div id="tab-script">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem">
      <p class="sec-title" style="margin:0">스크립트</p>
      <button class="btn btn-ghost btn-sm" id="script-toggle" onclick="toggleScript()">숨기기</button>
    </div>
    <div class="script-panel" id="script-text"></div>
  </div>
  <div id="tab-keywords" style="display:none">
    <div class="card card-sm">
      <p class="sec-title" style="margin-bottom:.875rem">핵심 표현</p>
      <div id="kw-list"></div>
    </div>
  </div>
  <div id="tab-tip" style="display:none">
    <div class="tip-card" id="tip-text"></div>
  </div>

  <div style="display:flex;gap:8px;margin-top:1rem">
    <button class="btn btn-full" onclick="prevQuestion()">← 이전</button>
    <button class="btn btn-gold btn-full" id="done-btn" onclick="markDone()">✓ 완료</button>
    <button class="btn btn-full" onclick="nextQuestion()">다음 →</button>
  </div>
  <div style="text-align:center;margin-top:.75rem">
    <button class="btn btn-ghost btn-sm" onclick="backToSet()">← 문항 목록</button>
  </div>
</div>

</div>
<script src="data/_index.js"></script>
<script src="shared/utils.js"></script>
<script src="shared/db.js"></script>
<script>
var params = new URLSearchParams(location.search);
var STU_ID = params.get('stu') || 'guest';
var STU_NAME = params.get('name') || '학생';

var currentSetInfo = null;
var questions = [];
var currentQIdx = 0;
var progress = {};
var scriptVisible = true;
var audio = document.getElementById('player-audio');
var ttsRate = 1.0;


function fmtTime(s) {
  if (!s || isNaN(s)) return '0:00';
  var m = Math.floor(s / 60);
  var sec = Math.floor(s % 60);
  return m + ':' + (sec < 10 ? '0' : '') + sec;
}

var VIEWS = ['library','set','question'];
function showView(name) {
  VIEWS.forEach(function(v) {
    var el = document.getElementById('view-' + v);
    if (el) el.style.display = (v === name) ? 'block' : 'none';
  });
}

function goBack() {
  var visible = null;
  for (var i = 0; i < VIEWS.length; i++) {
    var el = document.getElementById('view-' + VIEWS[i]);
    if (el && el.style.display !== 'none') { visible = VIEWS[i]; break; }
  }
  if (!visible || visible === 'library') {
    window.location.href = 'index.html?stu=' + STU_ID + '&name=' + encodeURIComponent(STU_NAME);
  } else if (visible === 'question') {
    backToSet();
  } else {
    showView('library');
    document.getElementById('back-btn').textContent = '← 홈';
    audio.pause();
  }
}

function backToSet() {
  audio.pause();
  showView('set');
  document.getElementById('back-btn').textContent = '← 목록';
  renderQList();
}

async function initLibrary() {
  var grid = document.getElementById('catalog-grid');
  if (!grid) return;
  if (typeof LISTENING_CATALOG === 'undefined' || !LISTENING_CATALOG) {
    grid.innerHTML = '<div class="empty">리스닝 데이터를 불러오는 중...</div>';
    return;
  }
  var html = '';
  for (var i = 0; i < LISTENING_CATALOG.length; i++) {
    var s = LISTENING_CATALOG[i];
    html += '<div class="catalog-card card-interactive" id="lcat-' + s.id + '" onclick="selectSet(\'' + s.id + '\')">' +
      '<div class="catalog-icon">' + s.icon + '</div>' +
      '<div class="catalog-name">' + s.name + '</div>' +
      '<div class="catalog-count" id="lcat-cnt-' + s.id + '">' + s.total + '문항</div>' +
      '<div id="lcat-prog-' + s.id + '" style="height:4px;background:var(--sur2);border-radius:99px;margin-top:4px;overflow:hidden"><div style="height:100%;background:var(--gold);width:0%;border-radius:99px"></div></div>' +
      '<span class="catalog-tag" style="background:' + s.color + '18;color:' + s.color + ';border:1px solid ' + s.color + '30">' + s.tag + '</span>' +
      '</div>';
  }
  grid.innerHTML = html;

  // 세트별 진도율 비동기 로드
  for (var j = 0; j < LISTENING_CATALOG.length; j++) {
    (function(setInfo) {
      DB.getListeningProgress(STU_ID, setInfo.id).then(function(prog) {
        var done = Object.values(prog || {}).filter(Boolean).length;
        var total = setInfo.total || 1;
        var pct = Math.round(done / total * 100);
        var cntEl = document.getElementById('lcat-cnt-' + setInfo.id);
        if (cntEl) cntEl.textContent = total + '문항' + (done ? ' · ' + pct + '% 완료' : '');
        var progEl = document.getElementById('lcat-prog-' + setInfo.id);
        if (progEl && progEl.firstElementChild) progEl.firstElementChild.style.width = pct + '%';
        if (pct >= 100) {
          var card = document.getElementById('lcat-' + setInfo.id);
          if (card) { card.style.borderColor = 'var(--grn,#4caf50)'; card.style.borderWidth = '2px'; }
        }
      }).catch(function(){});
    })(LISTENING_CATALOG[j]);
  }
}

async function selectSet(setId) {
  currentSetInfo = null;
  for (var i = 0; i < LISTENING_CATALOG.length; i++) {
    if (LISTENING_CATALOG[i].id === setId) { currentSetInfo = LISTENING_CATALOG[i]; break; }
  }
  if (!currentSetInfo) return;

  try {
    var res = await fetch('data/listening/' + currentSetInfo.metaFile);
    questions = await res.json();
  } catch(e) {
    alert('메타 데이터를 불러올 수 없습니다.');
    return;
  }

  try {
    progress = await DB.getListeningProgress(STU_ID, setId);
  } catch(e) { progress = {}; }

  showView('set');
  document.getElementById('back-btn').textContent = '← 목록';
  document.getElementById('page-title').textContent = currentSetInfo.name;

  var done = Object.values(progress).filter(Boolean).length;
  var pct = Math.round(done / questions.length * 100);
  document.getElementById('set-info-card').innerHTML =
    '<div style="display:flex;align-items:center;gap:12px;margin-bottom:.875rem">' +
    '<span style="font-size:28px">' + currentSetInfo.icon + '</span>' +
    '<div><div style="font-size:15px;font-weight:600">' + currentSetInfo.name + '</div>' +
    '<div style="font-size:11px;color:var(--txt2)">' + currentSetInfo.subname + '</div></div>' +
    '<span class="badge b-gold" style="margin-left:auto">' + done + '/' + questions.length + '</span>' +
    '</div>' +
    '<div class="prog-track"><div class="prog-fill" style="width:' + pct + '%"></div></div>';

  renderQList();
}

function renderQList() {
  var done = Object.values(progress).filter(Boolean).length;
  var fill = document.querySelector('.prog-fill');
  if (fill) fill.style.width = Math.round(done / questions.length * 100) + '%';

  var html = '';
  for (var i = 0; i < questions.length; i++) {
    var q = questions[i];
    var isDone = !!progress[q.num];
    var diffColor = q.difficulty === '하' ? 'var(--grn)' : q.difficulty === '중' ? 'var(--amb)' : 'var(--red)';
    var numStr = String(q.num).padStart(2, '0');
    var qShort = q.question.slice(0, 30);
    var numClass = 'q-num' + (isDone ? ' done' : '');
    html += '<div class="q-list-item" onclick="openQuestion(' + i + ')">' +
      '<span class="' + numClass + '">' + numStr + '</span>' +
      '<span style="font-size:13px;color:var(--txt);flex:1">' + qShort + '…</span>' +
      '<span class="q-type-badge" style="background:var(--sur3);color:var(--txt2)">' + q.type + '</span>' +
      '<span class="q-diff" style="color:' + diffColor + '">' + q.difficulty + '</span>' +
      '</div>';
  }
  document.getElementById('q-list').innerHTML = html;
}

async function openQuestion(idx) {
  currentQIdx = idx;
  var q = questions[idx];
  showView('question');
  document.getElementById('back-btn').textContent = '← 목록';

  document.getElementById('q-num-badge').textContent = 'Q.' + q.num;
  var typeEl = document.getElementById('q-type-badge');
  typeEl.textContent = q.type;
  typeEl.className = 'badge b-gold';
  var diffEl = document.getElementById('q-diff-badge');
  diffEl.textContent = q.difficulty;
  diffEl.className = 'badge ' + (q.difficulty === '하' ? 'b-grn' : q.difficulty === '중' ? 'b-amb' : 'b-red');
  document.getElementById('q-question').textContent = q.question;

  // 단어 카드
  var kwHtml = '';
  if (q.keyExpressions && q.keyExpressions.length) {
    for (var i = 0; i < q.keyExpressions.length; i++) {
      var en = q.keyExpressions[i][0];
      var ko = q.keyExpressions[i][1];
      kwHtml += '<div class="kw-card">' +
        '<div class="kw-en">' + en + '</div>' +
        '<div class="kw-ko">' + ko + '</div>' +
        '<button class="tts-btn" style="margin-left:auto;font-size:10px;padding:3px 8px" onclick="speakText(\'' + en.replace(/'/g, '') + '\')">🔊</button>' +
        '</div>';
    }
  } else {
    kwHtml = '<div class="empty" style="padding:1rem 0">키워드 없음</div>';
  }
  document.getElementById('kw-list').innerHTML = kwHtml;

  document.getElementById('tip-text').textContent = q.tip || '이 문항의 팁이 없습니다.';

  // 완료 버튼 리셋
  var doneBtn = document.getElementById('done-btn');
  doneBtn.textContent = '✓ 완료';
  doneBtn.className = 'btn btn-gold btn-full';

  // 오디오
  var fileNum = String(q.num).padStart(2, '0');
  // jsDelivr CDN - iOS Safari 완벽 호환
  audio.src = 'https://pub-01b22b967750499fbe6e99725c749e93.r2.dev/' + currentSetInfo.audioDir + '/' + fileNum + '.mp3';
  audio.playbackRate = 1.0;
  document.getElementById('play-btn').textContent = '▶';

  // 스크립트
  renderScript(q);
  switchTab('script');
}

function renderScript(q) {
  var script = q.script || '';

  // W: M: 화자 레이블을 파싱해서 대화형 스크립트 처리
  // "W: 대사. M: 대사." 패턴 감지
  var dialogPattern = /^(?:[WM]\s*:\s*)/;
  var isDialog = dialogPattern.test(script.trim());

  var sentences = [];
  if (isDialog) {
    // 화자 레이블 기준으로 발화 분리
    var parts = script.split(/(?=[WM]\s*:)/);
    for (var p = 0; p < parts.length; p++) {
      var part = parts[p].trim();
      if (!part) continue;
      // 화자 레이블과 대사 분리
      var labelMatch = part.match(/^([WM])\s*:\s*([\s\S]+)/);
      if (labelMatch) {
        var speaker = labelMatch[1]; // 'W' or 'M'
        var utterance = labelMatch[2].trim();
        // 대사 안에서 문장 분리
        var subSents = utterance.match(/[^.!?]+[.!?]+["']?/g) || [utterance];
        for (var ss = 0; ss < subSents.length; ss++) {
          sentences.push({ text: subSents[ss].trim(), speaker: speaker, tts: subSents[ss].trim() });
        }
      } else {
        sentences.push({ text: part, speaker: null, tts: part });
      }
    }
  } else {
    // 일반 독백 - 문장 단위 분리
    var rawSents = script.match(/[^.!?]+[.!?]+["']?/g) || [script];
    for (var r = 0; r < rawSents.length; r++) {
      sentences.push({ text: rawSents[r].trim(), speaker: null, tts: rawSents[r].trim() });
    }
  }

  // 키 표현 강조 처리 함수
  function highlightKeywords(text) {
    if (!q.keyExpressions) return text;
    for (var i = 0; i < q.keyExpressions.length; i++) {
      var en = q.keyExpressions[i][0];
      var escaped = en.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      var re = new RegExp('(' + escaped + ')', 'gi');
      text = text.replace(re, '<span class="keyword" onclick="event.stopPropagation();speakText(this.textContent)" data-en="' + en + '" data-ko="' + (q.keyExpressions[i][1]||'') + '">$1</span>');
    }
    return text;
  }

  var speakerColors = { 'W': 'var(--gold)', 'M': '#60A5FA' };
  var speakerLabels = { 'W': '여', 'M': '남' };
  var htmlStr = '<div class="tts-hint">💡 문장 탭 → TTS 재생 &nbsp;|&nbsp; 밑줄 단어 탭 → 발음 + ⭐ 북마크</div>';
  for (var s = 0; s < sentences.length; s++) {
    var sentObj = sentences[s];
    if (!sentObj || !sentObj.text) continue;
    var highlighted = highlightKeywords(sentObj.text);
    var ttsText = sentObj.tts || sentObj.text;
    var plain = ttsText.replace(/<[^>]+>/g, '');
    var encodedTts = encodeURIComponent(plain);
    var speakerBadge = '';
    if (sentObj.speaker) {
      var color = speakerColors[sentObj.speaker] || 'var(--txt3)';
      var label = speakerLabels[sentObj.speaker] || sentObj.speaker;
      speakerBadge = '<span style="font-size:10px;font-weight:700;color:' + color + ';margin-right:4px;flex-shrink:0">' + label + '</span>';
      htmlStr += '<span class="sentence" style="display:flex;align-items:baseline;gap:2px" data-idx="' + s + '" data-tts="' + encodedTts + '">' + speakerBadge + '<span>' + highlighted + '</span></span>';
    } else {
      htmlStr += '<span class="sentence" data-idx="' + s + '" data-tts="' + encodedTts + '">' + highlighted + '</span>';
    }
  }

  document.getElementById('script-text').innerHTML = htmlStr;
  // 클릭 이벤트를 addEventListener로 등록 (onclick 속성 따옴표 문제 해결)
  document.querySelectorAll('#script-text .sentence').forEach(function(el) {
    el.addEventListener('click', function(e) {
      if (e.target.classList.contains('keyword')) {
        // 키워드: TTS + 북마크 팝업
        var kw = e.target;
        speakText(kw.textContent);
        showListeningBookmarkPopup(kw, kw.dataset.en || kw.textContent, kw.dataset.ko || '');
        return;
      }
      var tts = decodeURIComponent(this.dataset.tts || '');
      if (tts) speakSentence(this, tts);
    });
  });
  scriptVisible = true;
  document.getElementById('script-toggle').textContent = '숨기기';
}

// 현재 말하고 있는 문장 엘리먼트
var currentSpeakingEl = null;

function speakSentence(el, text) {
  // 이미 같은 문장이면 취소 (토글)
  if (currentSpeakingEl === el) {
    window.speechSynthesis.cancel();
    el.classList.remove('speaking');
    currentSpeakingEl = null;
    return;
  }
  // 이전 하이라이트 제거
  if (currentSpeakingEl) currentSpeakingEl.classList.remove('speaking');
  window.speechSynthesis.cancel();

  currentSpeakingEl = el;
  el.classList.add('speaking');

  speakText(text, function() {
    el.classList.remove('speaking');
    currentSpeakingEl = null;
  });
}

function speakText(text, onend) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  var u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  u.rate = ttsRate;
  u.pitch = 1.0;

  // 영어 원어민 음성 선택 (있으면)
  var voices = window.speechSynthesis.getVoices();
  var preferred = ['Google US English', 'Samantha', 'Alex', 'Karen', 'Daniel'];
  for (var p = 0; p < preferred.length; p++) {
    for (var v = 0; v < voices.length; v++) {
      if (voices[v].name === preferred[p] || voices[v].name.indexOf(preferred[p]) !== -1) {
        u.voice = voices[v];
        break;
      }
    }
    if (u.voice) break;
  }
  // fallback: en-US 아무 목소리
  if (!u.voice) {
    for (var v = 0; v < voices.length; v++) {
      if (voices[v].lang === 'en-US') { u.voice = voices[v]; break; }
    }
  }

  if (onend) u.onend = onend;
  window.speechSynthesis.speak(u);
}

function toggleScript() {
  var el = document.getElementById('script-text');
  scriptVisible = !scriptVisible;
  el.style.opacity = scriptVisible ? '1' : '0';
  el.style.filter = scriptVisible ? 'none' : 'blur(6px)';
  document.getElementById('script-toggle').textContent = scriptVisible ? '숨기기' : '보기';
}

function switchTab(name) {
  var tabs = ['script','keywords','tip'];
  tabs.forEach(function(t) {
    document.getElementById('tab-' + t).style.display = t === name ? 'block' : 'none';
    document.getElementById('stab-' + t).classList.toggle('active', t === name);
  });
}

audio.addEventListener('timeupdate', function() {
  var pct = audio.duration ? (audio.currentTime / audio.duration * 100) : 0;
  document.getElementById('audio-fill').style.width = pct + '%';
  document.getElementById('time-cur').textContent = fmtTime(Math.floor(audio.currentTime));
  // A-B 루프
  if (abLooping && abPoints.a !== null && abPoints.b !== null) {
    if (audio.currentTime >= abPoints.b) { audio.currentTime = abPoints.a; }
  }
  // A-B 현재 위치 표시
  var curPos = document.getElementById('ab-cur-pos');
  var abTrack = document.getElementById('ab-track');
  if (curPos && audio.duration && abTrack && abTrack.style.display !== 'none') {
    curPos.style.left = pct + '%';
  }
});
function updateDuration() {
  if (audio.duration && !isNaN(audio.duration)) {
    document.getElementById('time-dur').textContent = fmtTime(Math.floor(audio.duration));
  }
}
audio.addEventListener('loadedmetadata', updateDuration);
audio.addEventListener('durationchange', updateDuration);
audio.addEventListener('canplay', updateDuration);
audio.addEventListener('ended', function() {
  document.getElementById('play-btn').textContent = '▶';
});

function togglePlay() {
  if (audio.paused) {
    audio.play();
    document.getElementById('play-btn').textContent = '⏸';
  } else {
    audio.pause();
    document.getElementById('play-btn').textContent = '▶';
  }
}
function seekRel(sec) {
  audio.currentTime = Math.max(0, Math.min(audio.duration || 0, audio.currentTime + sec));
}
function seekAudio(e) {
  var bar = document.getElementById('prog-bar');
  audio.currentTime = (audio.duration || 0) * (e.offsetX / bar.offsetWidth);
}
function setSpeed(rate) {
  audio.playbackRate = rate;
  // 🎵 음원 속도 버튼만 active (첫 번째 speed-row)
  var rows = document.querySelectorAll('.speed-row');
  if (rows[0]) rows[0].querySelectorAll('.speed-btn').forEach(function(b) {
    b.classList.toggle('active', parseFloat(b.textContent) === rate);
  });
}
function setTtsRate(rate) {
  ttsRate = rate;
  // 🔊 TTS 속도 버튼만 active (두 번째 speed-row)
  var rows = document.querySelectorAll('.speed-row');
  if (rows[1]) rows[1].querySelectorAll('.speed-btn').forEach(function(b) {
    b.classList.toggle('active', parseFloat(b.textContent) === rate);
  });
}

async function markDone() {
  var q = questions[currentQIdx];
  progress[q.num] = true;
  try { await DB.saveListeningProgress(STU_ID, currentSetInfo.id, q.num, true); } catch(e) {}

  var btn = document.getElementById('done-btn');
  btn.textContent = '✓ 완료됨';
  btn.className = 'btn btn-ghost btn-full';
}
var abPoints = { a: null, b: null };
var abLooping = false;
var abLoopInterval = null;

function setAbPoint(pt) {
  if (!audio.duration || isNaN(audio.duration)) return;
  abPoints[pt] = audio.currentTime;
  var btn = document.getElementById('ab-btn-' + pt);
  if (btn) {
    btn.classList.add('active');
    btn.textContent = pt.toUpperCase() + ':' + fmtTime(abPoints[pt]);
  }
  updateAbTrack();
  // A,B 둘 다 설정되면 반복 버튼 표시
  if (abPoints.a !== null && abPoints.b !== null) {
    // A > B면 스왑
    if (abPoints.a > abPoints.b) { var tmp = abPoints.a; abPoints.a = abPoints.b; abPoints.b = tmp; }
    var loopBtn = document.getElementById('ab-loop-btn');
    if (loopBtn) loopBtn.style.display = 'inline-flex';
  }
}

function updateAbTrack() {
  var track = document.getElementById('ab-track');
  if (!audio.duration || !track) return;
  track.style.display = 'block';
  document.getElementById('ab-time-display').style.display = 'block';
  var dur = audio.duration;
  if (abPoints.a !== null) {
    var ha = document.getElementById('ab-handle-a');
    ha.style.display = 'block';
    ha.style.left = (abPoints.a / dur * 100) + '%';
  }
  if (abPoints.b !== null) {
    var hb = document.getElementById('ab-handle-b');
    hb.style.display = 'block';
    hb.style.left = (abPoints.b / dur * 100) + '%';
  }
  if (abPoints.a !== null && abPoints.b !== null) {
    var range = document.getElementById('ab-range');
    var pctA = abPoints.a / dur * 100;
    var pctB = abPoints.b / dur * 100;
    range.style.left = pctA + '%';
    range.style.width = (pctB - pctA) + '%';
    var timeEl = document.getElementById('ab-time-display');
    timeEl.textContent = 'A: ' + fmtTime(abPoints.a) + '  →  B: ' + fmtTime(abPoints.b) + '  (' + fmtTime(abPoints.b - abPoints.a) + ')';
  }
}

function toggleAbLoop() {
  if (abPoints.a === null || abPoints.b === null) return;
  abLooping = !abLooping;
  var btn = document.getElementById('ab-loop-btn');
  if (abLooping) {
    btn.textContent = '반복⏹';
    btn.classList.add('active');
    audio.currentTime = abPoints.a;
    audio.play();
    document.getElementById('play-btn').textContent = '⏸';
  } else {
    btn.textContent = '반복▶';
    btn.classList.remove('active');
  }
}

function clearAb() {
  abPoints = { a: null, b: null };
  abLooping = false;
  ['ab-btn-a','ab-btn-b'].forEach(function(id) {
    var el = document.getElementById(id);
    if (el) { el.classList.remove('active'); el.textContent = id.includes('-a') ? 'A' : 'B'; }
  });
  var loopBtn = document.getElementById('ab-loop-btn');
  if (loopBtn) { loopBtn.style.display = 'none'; loopBtn.textContent = '반복▶'; loopBtn.classList.remove('active'); }
  var track = document.getElementById('ab-track');
  if (track) track.style.display = 'none';
  var timeEl = document.getElementById('ab-time-display');
  if (timeEl) timeEl.style.display = 'none';
  document.getElementById('ab-range').style.width = '0';
  ['ab-handle-a','ab-handle-b'].forEach(function(id){
    var el = document.getElementById(id);
    if(el) el.style.display = 'none';
  });
}

function seekAudioFromAb(e) {
  var track = document.getElementById('ab-track');
  var rect = track.getBoundingClientRect();
  var pct = (e.clientX - rect.left) / rect.width;
  audio.currentTime = pct * (audio.duration || 0);
}

function prevQuestion() {
  audio.pause();
  if (currentQIdx > 0) openQuestion(currentQIdx - 1);
}
function nextQuestion() {
  audio.pause();
  if (currentQIdx < questions.length - 1) openQuestion(currentQIdx + 1);
  else backToSet();
}

initLibrary();

// ── 리스닝 북마크 ────────────────────────────────
var listeningBookmarks = {}; // word → {word, ko}

async function loadListeningBookmarks() {
  try {
    var stuId = new URLSearchParams(location.search).get('stu') || 'guest';
    var res = await fetch('https://eng-trainer-65cac-default-rtdb.firebaseio.com/bookmarks/' + stuId + '.json');
    var data = await res.json();
    listeningBookmarks = data || {};
  } catch(e) { listeningBookmarks = {}; }
}

async function toggleListeningBookmark(word, ko) {
  try {
    var stuId = new URLSearchParams(location.search).get('stu') || 'guest';
    if (stuId === 'guest') { showBmToast('로그인 후 북마크를 사용할 수 있어요'); return false; }
    var url = 'https://eng-trainer-65cac-default-rtdb.firebaseio.com/bookmarks/' + stuId + '/' + word + '.json';
    if (listeningBookmarks[word]) {
      await fetch(url, { method: 'DELETE' });
      delete listeningBookmarks[word];
      return false;
    } else {
      var payload = { word: word, ko: ko, addedAt: Date.now() };
      await fetch(url, { method: 'PUT', body: JSON.stringify(payload), headers: {'Content-Type':'application/json'} });
      listeningBookmarks[word] = payload;
      return true;
    }
  } catch(e) { return null; }
}

function showListeningBookmarkPopup(el, word, ko) {
  // 기존 팝업 제거
  var old = document.getElementById('bm-popup');
  if (old) old.remove();

  var isBm = !!listeningBookmarks[word];
  var popup = document.createElement('div');
  popup.id = 'bm-popup';
  popup.style.cssText = 'position:fixed;z-index:9999;background:var(--sur);border:1px solid var(--bdr);border-radius:var(--rs);padding:.75rem;box-shadow:0 4px 16px rgba(0,0,0,.2);min-width:160px;max-width:240px';

  popup.innerHTML =
    '<div style="font-weight:700;font-family:var(--font-display);font-style:italic;margin-bottom:2px">' + word + '</div>' +
    (ko ? '<div style="font-size:12px;color:var(--txt3);margin-bottom:.5rem">' + ko + '</div>' : '<div style="margin-bottom:.5rem"></div>') +
    '<button id="bm-toggle-btn" style="width:100%;padding:.375rem;background:' + (isBm ? 'var(--gold-bg)' : 'var(--sur2)') + ';border:1px solid ' + (isBm ? 'var(--gold-bdr)' : 'var(--bdr)') + ';border-radius:6px;font-size:13px;cursor:pointer;color:var(--txt)">' +
    (isBm ? '⭐ 북마크 해제' : '☆ 북마크 추가') + '</button>';

  document.body.appendChild(popup);

  // 위치 계산
  var rect = el.getBoundingClientRect();
  var top = rect.bottom + 6;
  var left = rect.left;
  if (left + 240 > window.innerWidth) left = window.innerWidth - 248;
  if (top + 100 > window.innerHeight) top = rect.top - 90;
  popup.style.top = top + 'px';
  popup.style.left = left + 'px';

  document.getElementById('bm-toggle-btn').addEventListener('click', async function() {
    var added = await toggleListeningBookmark(word, ko);
    popup.remove();
    if (added === true) showBmToast('⭐ 북마크에 추가됐어요');
    else if (added === false) showBmToast('☆ 북마크에서 제거됐어요');
  });

  // 외부 클릭 시 닫기
  setTimeout(function() {
    document.addEventListener('click', function closePop(e) {
      if (!popup.contains(e.target)) { popup.remove(); document.removeEventListener('click', closePop); }
    });
  }, 0);
}

function showBmToast(msg) {
  var t = document.getElementById('bm-toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'bm-toast';
    t.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.8);color:#fff;padding:.5rem 1rem;border-radius:99px;font-size:13px;z-index:9999;pointer-events:none;transition:opacity .3s';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._t);
  t._t = setTimeout(function(){ t.style.opacity='0'; }, 2000);
}

// 페이지 로드 시 북마크 로드
loadListeningBookmarks();
