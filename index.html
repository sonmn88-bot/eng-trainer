<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>English Trainer</title>
<link rel="stylesheet" href="shared/theme.css">
<style>
.module-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin-bottom: 1.5rem;
}
.module-card {
  background: var(--sur);
  border: 1px solid var(--bdr);
  border-radius: var(--rx);
  padding: 2rem 1.25rem 1.5rem;
  cursor: pointer;
  text-align: center;
  position: relative;
  overflow: hidden;
  transition: all .2s;
  text-decoration: none;
  display: block;
}
.module-card::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 50% 0%, var(--accent-color, rgba(201,169,97,.1)), transparent 70%);
  opacity: 0;
  transition: opacity .25s;
}
.module-card:hover {
  border-color: var(--accent-bdr, var(--gold-bdr));
  transform: translateY(-3px);
  box-shadow: var(--shadow-lg);
}
.module-card:hover::after { opacity: 1; }
.module-icon {
  font-size: 40px;
  margin-bottom: .875rem;
  display: block;
  filter: drop-shadow(0 2px 8px rgba(0,0,0,.3));
}
.module-name {
  font-family: var(--font-body);
  font-size: 18px;
  font-weight: 700;
  font-style: normal;
  color: var(--txt);
  margin-bottom: 4px;
  line-height: 1.1;
}
.module-desc {
  font-size: 10px;
  color: var(--txt3);
  letter-spacing: .08em;
  text-transform: uppercase;
}
.hero {
  text-align: center;
  padding: 2.5rem 0 2rem;
}
.hero-title {
  font-family: var(--font-body);
  font-size: clamp(32px, 8vw, 48px);
  font-weight: 800;
  font-style: normal;
  letter-spacing: -.03em;
  background: linear-gradient(135deg, var(--txt) 30%, var(--gold));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: .5rem;
  line-height: 1.1;
}
.hero-sub {
  font-size: 11px;
  color: var(--txt3);
  letter-spacing: .18em;
  text-transform: uppercase;
}
.greeting {
  font-size: 13px;
  color: var(--txt2);
  text-align: center;
  margin-bottom: 1.5rem;
}
.greeting strong { color: var(--gold); font-weight: 500; }
</style>
</head>
<body>

<div class="app">

<!-- ── 학생 홈 ── -->
<div id="screen-home" class="screen active">
  <div class="hero">
    <div id="app-title-display" class="hero-title">English Trainer</div>
    <div class="hero-sub">수능 영어 전문</div>
    <!-- 오늘의 명언 -->
    <div id="daily-quote" style="margin-top:.875rem;font-size:12px;color:var(--txt3);font-style:italic;line-height:1.6;padding:0 .5rem"></div>
    <!-- D-day + 목표 -->
    <div id="dday-wrap" style="margin-top:.875rem">
      <div id="dday-count" style="font-size:28px;font-weight:800;color:var(--gold);letter-spacing:-.02em"></div>
      <div id="dday-detail" style="font-size:11px;color:var(--txt3);margin-top:2px"></div>
      <!-- 목표 등급 설정 (로그인 후에만) -->
      <div id="dday-goal-wrap" style="display:none;margin-top:.5rem">
        <select id="dday-goal-select" onchange="saveDdayGoal()" style="background:var(--sur2);border:1px solid var(--bdr);border-radius:6px;padding:3px 8px;color:var(--txt);font-size:11px;text-align:center">
          <option value="">목표 등급 설정</option>
          <option value="1">1등급 (90점+)</option>
          <option value="2">2등급 (80점+)</option>
          <option value="3">3등급 (70점+)</option>
        </select>
        <div id="dday-words-needed" style="font-size:11px;color:var(--txt2);margin-top:4px"></div>
      </div>
    </div>
  </div>

  <!-- 로그인 전 -->
  <div id="view-login">
    <div class="card">
      <p class="sec-title">학생 입장</p>
      <div class="inp-wrap">
        <input id="stu-input" type="text" placeholder="이름을 입력하세요" autocomplete="off"
               oninput="onStuInput()" onkeydown="onStuKeydown(event)">
        <div class="dd" id="stu-dd"></div>
      </div>
      <input type="hidden" id="stu-id">
      <div id="stu-err" style="color:var(--red);font-size:12px;text-align:center;margin-bottom:.5rem;min-height:16px"></div>
      <button class="btn btn-gold btn-full" onclick="doStuLogin()">입장 →</button>
      <p style="text-align:center;margin-top:1rem">
        <button class="btn btn-ghost btn-sm" onclick="goTeacher()">선생님 모드</button>
      </p>
    </div>
  </div>

  <!-- 로그인 후 -->
  <div id="view-main" style="display:none">
    <div id="streak-bar" class="streak-bar" style="display:none">
      <span style="font-size:22px">🔥</span>
      <div>
        <div class="streak-num" id="streak-num">0</div>
        <div style="font-size:10px;color:var(--txt2);text-transform:uppercase;letter-spacing:.08em">연속 출석일</div>
      </div>
      <div style="margin-left:auto;font-size:12px;color:var(--gold);font-weight:500;text-align:right;line-height:1.4" id="streak-msg"></div>
    </div>

    <div class="greeting" id="greeting"></div>

    <!-- 선생님 공지 배너 -->
    <div id="notice-banner" style="display:none;background:rgba(96,165,250,.08);border:1px solid rgba(96,165,250,.25);border-radius:var(--rs);padding:.75rem 1rem;margin-bottom:1rem">
      <div style="display:flex;align-items:flex-start;gap:8px">
        <span style="font-size:16px;flex-shrink:0">📢</span>
        <div style="flex:1">
          <div style="font-size:11px;color:var(--txt3);margin-bottom:2px">선생님 공지</div>
          <div style="font-size:13px;color:var(--txt);line-height:1.6" id="notice-text"></div>
        </div>
        <button onclick="dismissNotice()" style="background:none;border:none;color:var(--txt3);font-size:16px;cursor:pointer;padding:0;line-height:1">×</button>
      </div>
    </div>

    <!-- 오늘의 복습 알림 배너 -->
    <div id="review-alert" style="display:none;background:var(--gold-bg);border:1px solid var(--gold-bdr);border-radius:var(--rs);padding:.75rem 1rem;margin-bottom:1rem;cursor:pointer"
         onclick="goToReview()">
      <div style="display:flex;align-items:center;gap:10px">
        <span style="font-size:22px">🔔</span>
        <div style="flex:1">
          <div style="font-size:13px;font-weight:600;color:var(--gold)" id="review-alert-title">오늘의 복습</div>
          <div style="font-size:12px;color:var(--txt2);margin-top:2px" id="review-alert-msg"></div>
        </div>
        <span style="font-size:18px;color:var(--gold)">›</span>
      </div>
    </div>

    <!-- 취약단어 긴급 알림 -->
    <div id="weak-alert" style="display:none;background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.2);border-radius:var(--rs);padding:.625rem 1rem;margin-bottom:1rem">
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:16px">⚡</span>
        <div style="font-size:12px;color:var(--txt2)" id="weak-alert-msg"></div>
      </div>
    </div>

    <p class="sec-title">학습 시작</p>

    <!-- 오늘의 한 단어 -->
    <div id="word-of-day" style="display:none;margin-bottom:1rem">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem">
        <p class="sec-title" style="margin:0">✨ 오늘의 단어</p>
        <span id="wod-date" style="font-size:11px;color:var(--txt3)"></span>
      </div>
      <div class="card card-sm" style="position:relative">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px">
          <div style="flex:1">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:.375rem">
              <span id="wod-en" style="font-size:22px;font-weight:700;color:var(--txt);font-style:italic"></span>
              <button onclick="Utils.speak(document.getElementById('wod-en').textContent)" class="tts-btn" style="font-size:11px;padding:3px 8px">🔊</button>
            </div>
            <div id="wod-ko" style="font-size:14px;color:var(--gold);font-weight:500;margin-bottom:.375rem"></div>
            <div id="wod-mnemonic" style="display:none;font-size:12px;color:var(--txt2);background:var(--sur2);border-radius:var(--rs);padding:.375rem .625rem;border-left:2px solid var(--gold-bdr);line-height:1.5;margin-bottom:.375rem"></div>
            <div id="wod-example" style="display:none;font-size:12px;color:var(--txt3);font-style:italic;line-height:1.6"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="module-grid">
      <a class="module-card" href="vocab.html" id="mod-vocab"
         style="--accent-color:rgba(201,169,97,.1);--accent-bdr:var(--gold-bdr)">
        <span class="module-icon">📖</span>
        <div class="module-name">단어</div>
        <div class="module-desc">Vocabulary</div>
      </a>
      <a class="module-card" href="listening.html" id="mod-listen"
         style="--accent-color:rgba(96,165,250,.1);--accent-bdr:rgba(96,165,250,.25)">
        <span class="module-icon">🎧</span>
        <div class="module-name">리스닝</div>
        <div class="module-desc">Listening</div>
      </a>
    </div>

    <!-- 내 현황 -->
    <div class="card card-sm" id="my-stats" style="display:none">
      <p class="sec-title" style="margin-bottom:.875rem">내 현황</p>
      <div class="metrics" id="stats-grid"></div>
    </div>

    <div style="text-align:center;margin-top:1.5rem">
      <button class="btn btn-ghost btn-sm" onclick="logout()">← 나가기</button>
    </div>
  </div>
</div>

<!-- ── 선생님 로그인 ── -->
<div id="screen-teacher-login" class="screen">
  <div class="pw-wrap">
    <div class="card" style="text-align:center">
      <div style="font-size:36px;margin-bottom:1rem">🔒</div>
      <p class="sec-title">선생님 모드</p>
      <p style="font-size:13px;color:var(--txt2);margin-bottom:1.25rem">비밀번호를 입력하세요</p>
      <input type="password" id="pw-input" placeholder="비밀번호"
             style="text-align:center;margin-bottom:6px" onkeydown="if(event.key==='Enter')doLogin()">
      <div style="font-size:12px;color:var(--red);min-height:18px;margin-bottom:10px" id="pw-err"></div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-full" onclick="showHome()">취소</button>
        <button class="btn btn-gold btn-full" onclick="doLogin()">입장 →</button>
      </div>
      <p style="font-size:11px;color:var(--txt3);margin-top:1rem">초기 비밀번호: 1234</p>
    </div>
  </div>
</div>

</div><!-- .app -->

<!-- 주간 학습 리포트 팝업 -->
<div id="weekly-report-popup" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9997;align-items:flex-start;justify-content:center;padding-top:60px;overflow-y:auto">
  <div style="background:var(--sur);border-radius:20px;padding:1.5rem;max-width:320px;width:90%;position:relative">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">
      <div>
        <div style="font-size:11px;color:var(--txt3);margin-bottom:2px">지난 주 학습 요약</div>
        <div style="font-size:17px;font-weight:700;color:var(--txt)">📊 주간 리포트</div>
      </div>
      <button onclick="closeWeeklyReport()" style="background:none;border:none;color:var(--txt3);font-size:20px;cursor:pointer">×</button>
    </div>
    <div id="weekly-report-content"></div>
    <button class="btn btn-gold btn-full" style="margin-top:1rem" onclick="closeWeeklyReport()">이번 주도 화이팅! 💪</button>
  </div>
</div>
<div id="sticker-popup" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9998;align-items:center;justify-content:center">
  <div style="background:var(--sur);border-radius:20px;padding:2rem 1.5rem;text-align:center;max-width:280px;width:90%;position:relative;animation:pop-in .35s cubic-bezier(.175,.885,.32,1.275)">
    <div id="sticker-popup-emoji" style="font-size:64px;margin-bottom:.75rem;line-height:1"></div>
    <div style="font-size:11px;color:var(--txt3);margin-bottom:.375rem">선생님이 보낸 메시지</div>
    <div id="sticker-popup-msg" style="font-size:16px;font-weight:600;color:var(--txt);margin-bottom:1.25rem;line-height:1.5"></div>
    <button class="btn btn-gold btn-full" onclick="closeSticker()">감사해요! 😊</button>
  </div>
</div>
<style>
@keyframes pop-in { from { transform:scale(0.6); opacity:0; } to { transform:scale(1); opacity:1; } }
</style>

<script src="data/_index.js"></script>
<script src="data/words/personal.js"></script>
<script src="data/words/mnemonics.js"></script>
<script src="data/words/examples.js"></script>
<script src="shared/utils.js"></script>
<script src="shared/db.js"></script>
<script>
// ── State ──────────────────────────────────────
let state = {
  stuId: null,
  stuName: null,
  students: {},
  settings: { appName: 'English Trainer', teacherPw: '1234' }
};

// ── Init ───────────────────────────────────────
async function init() {
  try {
    state.settings = await DB.getSettings();
    document.getElementById('app-title-display').textContent = state.settings.appName || 'English Trainer';
    document.title = state.settings.appName || 'English Trainer';
  } catch(e) { /* Firebase 미설정 시 무시 */ }

  // 세션 복원
  const saved = sessionStorage.getItem('stuId');
  if (saved) {
    state.stuId = saved;
    state.stuName = sessionStorage.getItem('stuName') || '';
    await showMain();
  }

  try {
    state.students = await DB.getStudents();
  } catch(e) {}

  // 오늘의 명언 (날짜 기반 고정)
  try {
    var QUOTES = [
      '"The secret of getting ahead is getting started." — Mark Twain',
      '"It always seems impossible until it\'s done." — Nelson Mandela',
      '"Don\'t watch the clock; do what it does. Keep going." — Sam Levenson',
      '"Success is the sum of small efforts repeated day in and day out." — R. Collier',
      '"The expert in anything was once a beginner." — Helen Hayes',
      '"You don\'t have to be great to start, but you have to start to be great." — Zig Ziglar',
      '"Believe you can and you\'re halfway there." — Theodore Roosevelt',
      '"Every accomplishment starts with the decision to try." — J.F. Kennedy',
      '"Small daily improvements over time lead to stunning results." — Robin Sharma',
      '"The only way to do great work is to love what you do." — Steve Jobs',
      '"Push yourself, because no one else is going to do it for you."',
      '"Great things never come from comfort zones."',
      '"Dream it. Wish it. Do it."',
      '"Success doesn\'t just find you. You have to go out and get it."',
      '"The harder you work for something, the greater you\'ll feel when you achieve it."'
    ];
    var today3 = new Date();
    var qi = (today3.getFullYear() * 366 + today3.getMonth() * 31 + today3.getDate()) % QUOTES.length;
    var qEl = document.getElementById('daily-quote');
    if (qEl) qEl.textContent = QUOTES[qi];
  } catch(e) {}

  // D-day 계산 (2026 수능: 11월 12일)
  try {
    var suneung = new Date('2026-11-12T00:00:00');
    var today2 = new Date(); today2.setHours(0,0,0,0);
    var diff = Math.ceil((suneung - today2) / 86400000);
    var ddayEl = document.getElementById('dday-count');
    var ddayDetail = document.getElementById('dday-detail');
    if (ddayEl) {
      if (diff > 0) { ddayEl.textContent = 'D-' + diff; if(ddayDetail) ddayDetail.textContent = '2026학년도 수능까지'; }
      else if (diff === 0) { ddayEl.textContent = 'D-DAY!'; }
      else { ddayEl.textContent = '수능 완료 🎉'; }
    }
  } catch(e) {}
}

// ── Student Login ──────────────────────────────
function onStuInput() {
  const val = document.getElementById('stu-input').value.trim();
  const dd = document.getElementById('stu-dd');
  if (!val || val.length < 1) { dd.style.display = 'none'; return; }

  const matches = Object.values(state.students)
    .filter(s => s.name && s.name.includes(val)).slice(0, 6);

  if (!matches.length) { dd.style.display = 'none'; return; }
  dd.innerHTML = matches.map(s =>
    `<div class="dd-item" onclick="selectStudent('${s.id}','${s.name}')">${s.name}</div>`
  ).join('');
  dd.style.display = 'block';
}

function onStuKeydown(e) {
  if (e.key === 'Enter') doStuLogin();
  if (e.key === 'Escape') document.getElementById('stu-dd').style.display = 'none';
}

function selectStudent(id, name) {
  state.stuId = id;
  document.getElementById('stu-input').value = name;
  document.getElementById('stu-id').value = id;
  document.getElementById('stu-dd').style.display = 'none';
}

async function doStuLogin() {
  const nameVal = document.getElementById('stu-input').value.trim();
  if (!nameVal) return;

  let id = document.getElementById('stu-id').value;

  // 기존 학생만 허용
  if (!id) {
    const match = Object.values(state.students).find(s => s.name === nameVal);
    if (match) {
      id = match.id;
    } else {
      const err = document.getElementById('stu-err');
      if (err) err.textContent = '등록되지 않은 학생입니다. 선생님에게 문의하세요.';
      return;
    }
  }

  state.stuId = id;
  state.stuName = nameVal;
  sessionStorage.setItem('stuId', id);
  sessionStorage.setItem('stuName', nameVal);
  // 마지막 접속일 업데이트
  try { DB.saveStudent(id, { lastSeen: new Date().toISOString() }); } catch(e) {}
  showMain();
}

async function showMain() {
  document.getElementById('view-login').style.display = 'none';
  document.getElementById('view-main').style.display = 'block';

  // 링크에 stuId 파라미터 전달
  document.getElementById('mod-vocab').href   = `vocab.html?stu=${state.stuId}&name=${encodeURIComponent(state.stuName)}`;
  document.getElementById('mod-listen').href  = `listening.html?stu=${state.stuId}&name=${encodeURIComponent(state.stuName)}`;

  // 인사말
  const h = new Date().getHours();
  const greet = h < 12 ? '좋은 아침이에요' : h < 18 ? '안녕하세요' : '오늘도 수고했어요';
  document.getElementById('greeting').innerHTML = `<strong>${state.stuName}</strong>님, ${greet} 👋`;

  // D-day 목표 설정 표시
  document.getElementById('dday-goal-wrap').style.display = 'block';
  var savedGoal = localStorage.getItem('dday_goal_' + state.stuId);
  if (savedGoal) {
    document.getElementById('dday-goal-select').value = savedGoal;
    updateDdayGoal(savedGoal);
  }

  // 오늘의 한 단어
  showWordOfDay();

  // 월요일이면 주간 리포트 표시
  try {
    var now = new Date();
    var isMonday = now.getDay() === 1;
    var weekKey = 'weekly_report_' + state.stuId + '_' + getWeekKey();
    var alreadyShown = localStorage.getItem(weekKey);
    if (isMonday && !alreadyShown) {
      var [results2, weakList2] = await Promise.all([
        DB.getResults(state.stuId),
        DB.getAllWeakWords(state.stuId)
      ]);
      showWeeklyReport(results2, weakList2, weekKey);
    }
  } catch(e) {}

  // 시험 범위 배너
  try {
    var examRange = await DB.getExamRange();
    if (examRange && examRange.setId && examRange.week) {
      var examBanner = document.getElementById('exam-range-banner');
      if (!examBanner) {
        examBanner = document.createElement('div');
        examBanner.id = 'exam-range-banner';
        examBanner.style.cssText = 'background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.2);border-radius:var(--rs);padding:.625rem 1rem;margin-bottom:1rem;cursor:pointer';
        examBanner.innerHTML = '<div style="display:flex;align-items:center;gap:8px">' +
          '<span style="font-size:16px">📝</span>' +
          '<div><div style="font-size:12px;color:var(--txt3)">이번 주 시험 범위</div>' +
          '<div id="exam-banner-text" style="font-size:13px;font-weight:600;color:var(--txt)"></div></div>' +
          '<span style="margin-left:auto;font-size:14px;color:var(--txt3)">›</span></div>';
        examBanner.onclick = function() {
          window.location.href = 'vocab.html?stu=' + state.stuId + '&name=' + encodeURIComponent(state.stuName) +
            '&examSet=' + examRange.setId + '&examWeek=' + examRange.week;
        };
        var weakAlertEl = document.getElementById('weak-alert');
        weakAlertEl.parentNode.insertBefore(examBanner, weakAlertEl);
      }
      document.getElementById('exam-banner-text').textContent = examRange.setName + ' ' + examRange.week + '주차';
      examBanner.style.display = 'block';
    }
  } catch(e) {}
  try {
    var sticker = await DB.getSticker(state.stuId);
    if (sticker && !sticker.read) {
      document.getElementById('sticker-popup-emoji').textContent = sticker.emoji || '🌟';
      document.getElementById('sticker-popup-msg').textContent = sticker.message || '잘하고 있어요!';
      document.getElementById('sticker-popup').style.display = 'flex';
      window._pendingStickerStuId = state.stuId;
    }
  } catch(e) {}
  try {
    var notice = await DB.getNotice();
    if (notice && notice.text) {
      var dismissed = localStorage.getItem('notice_dismissed_' + notice.updatedAt);
      if (!dismissed) {
        document.getElementById('notice-text').textContent = notice.text;
        document.getElementById('notice-banner').style.display = 'block';
        // 읽음 처리용 updatedAt 저장
        document.getElementById('notice-banner').dataset.ts = notice.updatedAt;
      }
    }
  } catch(e) {}

  // 스트릭
  try {
    const cnt = await DB.updateStreak(state.stuId);
    if (cnt > 0) {
      document.getElementById('streak-num').textContent = cnt;
      document.getElementById('streak-msg').textContent = cnt >= 7 ? '🔥 7일 연속 달성!' : `${cnt}일째 공부 중`;
      document.getElementById('streak-bar').style.display = 'flex';
    }
  } catch(e) {}

  // 현황 통계 + 복습/취약 알림 (동시에)
  try {
    const [results, weakList] = await Promise.all([
      DB.getResults(state.stuId),
      DB.getWeakWords(state.stuId)
    ]);

    if (results.length) {
      const total = results.length;
      const avg = Math.round(results.reduce((s,r) => s + (r.score||0), 0) / total);
      document.getElementById('stats-grid').innerHTML = `
        <div class="metric"><div class="metric-lbl">총 시험</div><div class="metric-val mv-gold">${total}</div></div>
        <div class="metric"><div class="metric-lbl">평균 점수</div><div class="metric-val mv-grn">${avg}%</div></div>
        <div class="metric"><div class="metric-lbl">취약 단어</div><div class="metric-val mv-red">${weakList.length}</div></div>`;
      document.getElementById('my-stats').style.display = 'block';
    }

    // 망각 예측 + 복습 알림
    if (weakList.length) {
      const now = Date.now();
      const DAY = 86400000;

      // SM-2 기반 망각 예측: wrong↑ streak↓ 일수록 빨리 잊음
      const atRisk = weakList.filter(w => {
        if (!w.lastStudied) return true; // 오래된 단어
        const elapsed = (now - w.lastStudied) / DAY;
        const streak = w.streak || 0;
        const wrong = w.wrong || 0;
        // 복습 주기 계산: streak 높을수록 주기 길어짐
        const interval = Math.max(0.5, Math.pow(2, streak - 1) * (wrong > 3 ? 0.5 : 1));
        return elapsed >= interval;
      });

      // 일반 복습 타이밍 (기존 1/3/7/14일 기준)
      const reviewWords = weakList.filter(w => {
        if (!w.lastStudied) return false;
        const elapsed = (now - w.lastStudied) / DAY;
        return [1,3,7,14].some(d => elapsed >= d - 0.5 && elapsed <= d + 0.5);
      });

      if (atRisk.length >= 2) {
        document.getElementById('review-alert').style.display = 'block';
        document.getElementById('review-alert-title').textContent = '⚠️ 잊기 전에 복습하세요';
        document.getElementById('review-alert-msg').textContent =
          atRisk.length + '개 단어를 곧 잊을 수 있어요. 지금 바로 복습하세요!';
        document.getElementById('review-alert').onclick = function() {
          window.location.href = 'vocab.html?stu=' + state.stuId + '&name=' + encodeURIComponent(state.stuName) + '&mode=review';
        };
      } else if (reviewWords.length >= 2) {
        document.getElementById('review-alert').style.display = 'block';
        document.getElementById('review-alert-title').textContent = '오늘의 복습 단어';
        document.getElementById('review-alert-msg').textContent =
          reviewWords.length + '개 단어가 복습 타이밍이에요. 탭해서 바로 시작하세요!';
        document.getElementById('review-alert').onclick = function() {
          window.location.href = 'vocab.html?stu=' + state.stuId + '&name=' + encodeURIComponent(state.stuName) + '&mode=review';
        };
      }

      if (weakList.length >= 10) {
        document.getElementById('weak-alert').style.display = 'block';
        document.getElementById('weak-alert-msg').textContent =
          '⚡ 취약 단어 ' + weakList.length + '개 쌓였어요. 집중훈련 모드로 줄여보세요!';
      }
    }
  } catch(e) {}
}

function getWeekKey() {
  var d = new Date();
  var jan1 = new Date(d.getFullYear(), 0, 1);
  var week = Math.ceil(((d - jan1) / 86400000 + jan1.getDay() + 1) / 7);
  return d.getFullYear() + 'W' + week;
}

function showWeeklyReport(results, weakList, weekKey) {
  // 지난 7일 데이터 필터
  var now = Date.now();
  var DAY7 = 7 * 86400000;
  var lastWeek = (results || []).filter(function(r) {
    return r.date && (now - new Date(r.date).getTime()) <= DAY7;
  });

  if (!lastWeek.length) return; // 지난 주 학습 없으면 표시 안 함

  var totalQuiz = lastWeek.length;
  var avgScore = Math.round(lastWeek.reduce(function(s,r){ return s+(r.score||0); },0) / totalQuiz);
  var bestScore = Math.max.apply(null, lastWeek.map(function(r){ return r.score||0; }));

  // 지난 주 학습 날짜 수 (스트릭)
  var days = new Set(lastWeek.map(function(r){ return r.date && r.date.slice(0,10); })).size;

  // TOP3 틀린 단어
  var wrongWords = (weakList || [])
    .filter(function(w){ return w.wrong > 0; })
    .sort(function(a,b){ return b.wrong - a.wrong; })
    .slice(0, 3);

  var scoreColor = avgScore >= 80 ? 'var(--grn,#4caf50)' : avgScore >= 60 ? 'var(--gold)' : 'var(--red,#e53935)';
  var scoreMsg = avgScore >= 80 ? '훌륭해요! 🌟' : avgScore >= 60 ? '잘하고 있어요 👍' : '더 열심히 해봐요 💪';

  var html =
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem">' +
    '<div style="background:var(--sur2);border-radius:var(--rs);padding:.75rem;text-align:center">' +
    '<div style="font-size:22px;font-weight:700;color:' + scoreColor + '">' + avgScore + '%</div>' +
    '<div style="font-size:11px;color:var(--txt3)">평균 점수</div></div>' +
    '<div style="background:var(--sur2);border-radius:var(--rs);padding:.75rem;text-align:center">' +
    '<div style="font-size:22px;font-weight:700;color:var(--gold)">' + days + '일</div>' +
    '<div style="font-size:11px;color:var(--txt3)">출석일</div></div>' +
    '<div style="background:var(--sur2);border-radius:var(--rs);padding:.75rem;text-align:center">' +
    '<div style="font-size:22px;font-weight:700;color:var(--txt)">' + totalQuiz + '회</div>' +
    '<div style="font-size:11px;color:var(--txt3)">시험 횟수</div></div>' +
    '<div style="background:var(--sur2);border-radius:var(--rs);padding:.75rem;text-align:center">' +
    '<div style="font-size:22px;font-weight:700;color:var(--grn,#4caf50)">' + bestScore + '%</div>' +
    '<div style="font-size:11px;color:var(--txt3)">최고 점수</div></div>' +
    '</div>' +
    '<div style="font-size:13px;font-weight:600;text-align:center;color:var(--txt2);margin-bottom:.75rem">' + scoreMsg + '</div>';

  if (wrongWords.length) {
    html += '<div style="background:rgba(239,68,68,.06);border-radius:var(--rs);padding:.625rem .875rem">' +
      '<div style="font-size:11px;color:var(--txt3);margin-bottom:.375rem">⚡ 취약 단어 TOP3</div>' +
      wrongWords.map(function(w) {
        return '<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:2px">' +
          '<span style="font-style:italic;font-weight:600">' + w.word + '</span>' +
          '<span style="color:var(--red,#e53935)">' + w.wrong + '회 틀림</span></div>';
      }).join('') + '</div>';
  }

  document.getElementById('weekly-report-content').innerHTML = html;
  document.getElementById('weekly-report-popup').style.display = 'flex';
  localStorage.setItem(weekKey, '1');
}

}

function saveDdayGoal() {
  var goal = document.getElementById('dday-goal-select').value;
  if (state.stuId) localStorage.setItem('dday_goal_' + state.stuId, goal);
  updateDdayGoal(goal);
}

function updateDdayGoal(goal) {
  var el = document.getElementById('dday-words-needed');
  if (!goal || !el) return;
  var suneung = new Date('2026-11-12T00:00:00');
  var today = new Date(); today.setHours(0,0,0,0);
  var daysLeft = Math.max(1, Math.ceil((suneung - today) / 86400000));
  // 목표별 필요 단어 수 (수능 영어 어휘 기준)
  var targetWords = { '1': 3000, '2': 2000, '3': 1500 };
  var target = targetWords[goal] || 2000;
  var studied = 0; // 간단히 0으로 시작 (정확한 집계는 DB 필요)
  var remaining = Math.max(0, target - studied);
  var perDay = Math.ceil(remaining / daysLeft);
  var gradeLabel = {'1':'1등급','2':'2등급','3':'3등급'}[goal];
  el.textContent = gradeLabel + ' 목표: 하루 ' + perDay + '개 필요 (남은 ' + remaining.toLocaleString() + '개)';
}

function showWordOfDay() {
  try {
    var words = window.PERSONAL;
    if (!words || !words.length) return;
    // 날짜 기반 시드로 매일 같은 단어 선택
    var today = new Date();
    var seed = today.getFullYear() * 10000 + (today.getMonth()+1) * 100 + today.getDate();
    var idx = seed % words.length;
    var w = words[idx];
    if (!w) return;

    var en = w[0], ko = w[1];
    document.getElementById('wod-en').textContent = en;
    document.getElementById('wod-ko').textContent = ko;
    document.getElementById('wod-date').textContent = (today.getMonth()+1) + '/' + today.getDate();

    // 연상법
    var mn = Utils.getMnemonic(en.toLowerCase(), ko);
    if (mn) {
      var mnEl = document.getElementById('wod-mnemonic');
      mnEl.textContent = '💡 ' + mn;
      mnEl.style.display = 'block';
    }

    // 예문
    var ex = window.EXAMPLES && window.EXAMPLES[en.toLowerCase()];
    if (ex && ex.en) {
      var exEl = document.getElementById('wod-example');
      exEl.textContent = '"' + ex.en + '"';
      exEl.style.display = 'block';
    }

    document.getElementById('word-of-day').style.display = 'block';
  } catch(e) {}
}
